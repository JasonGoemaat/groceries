<table flowbiteTable [tableBody]="tableBody" [data]="items()">
    <ng-template #tableBody let-data>
        <tr flowbiteTableBody>
            <td scope="row" class="px-2 py-4">
                <input flowbiteFormControl name="done" type="checkbox" [(ngModel)]="data.done" (change)="toggleDone(data, $event)"/>
            </td>
            <td class="px-6 py-4">@if (data.quantity?.length) { <span>data.quantity</span> }{{ data.itemName }}</td>
            <td class="px-2 py-4">archive</td>
        </tr>
    </ng-template>
</table>
